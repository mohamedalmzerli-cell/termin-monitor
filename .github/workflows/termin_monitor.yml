name: Termin Monitor – Bürgeramt Osnabrück

on:
  schedule:
    - cron: '*/10 7-17 * * 1-5'
  workflow_dispatch:

jobs:
  check-termin:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v3

      - name: Python einrichten
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install requests beautifulsoup4

      - name: Termin prüfen
        env:
          ABSENDER_EMAIL: ${{ secrets.ABSENDER_EMAIL }}
          ABSENDER_PASSWORT: ${{ secrets.ABSENDER_PASSWORT }}
          EMPFAENGER_EMAIL: ${{ secrets.EMPFAENGER_EMAIL }}
        run: python termin_monitor.py
